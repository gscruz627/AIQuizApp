<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Page</title>
</head>
<body>
    
    <h1 id="organization-name"></h1>

    <h3 id="organization-joincode"></h3>

    <p id="my-role"></p>

    <form id="create-quiz">
        <h2>Generate Quiz</h2>

        <label for="quiz-title">Title: </label>
        <input type="text" name="quiz-title" id="quiz-title">

        <label for="prompt">Prompt: </label>
        <textarea name="prompt" id="prompt" cols="30" rows="10"></textarea>

        <button type="submit">Create</button>
    </form>

    <a id="quizzes-link">Go To Quizzes</a>
    
    <div>
        <h1>Join Requests</h1>
        <ul id="join-requests-list">

        </ul>
    </div>



    <script src="organizations-script.js"></script>
</body>
</html>
